- name: variables
  hosts: local
  connection: local

  vars: 
    course: ansible
    duration: 10hr
    trainer: devi

  tasks:
    - name: print course information
      ansible.builtin.debug:
        msg: "Hello {{ course }}, course duration {{ duration }}, Trainer {{ trainer }}"

    vars: 
      course: Devops
      duration: 6hr
      trainer: tarun
    - name: print course info again
      ansible.builtin.debug:
        msg: "Hello {{ course }}, course duration {{ duration }}, Trainer {{ trainer }}"

