- name: installinf packages with loop
  host: frontend
  become: yes
  tasks:
    - name: installing packages
      ansible.builtin.package:
        name: "{{ item }}""
        state: present 
        msg: "installing package: "{{ item }}""
      loop:
        - nginx
        - mysql
        - zip
    

