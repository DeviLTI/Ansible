plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  instance-state-name:
    - running
  "tag:Name":
    - frontend

hostnames:
  - private-ip-address

keyed_groups:
  - key: tags.Name
    prefix: dynamic
    separator: "_"

compose:
  ansible_host: private_ip_address