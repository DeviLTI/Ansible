- name: variables from prompt
  hosts: local
  connection: local
  vars_prompt:
    - name: USERNAME
      prompt: "enter your user name "
      private: yes
  
    - name: PASSWORD
      prompt: "enter your password "
      private: yes

  tasks:
    - name: printing user info
      ansible.builtin.debug:
        msg: "Hello, your username: {{ USERNAME }} and Password : {{ PASSWORD }}"